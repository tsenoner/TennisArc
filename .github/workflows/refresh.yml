name: Refresh tennis data
# NOTE: GitHub-hosted runners use datacenter IPs that SofaScore's Cloudflare blocks (HTTP 403),
# so scheduled CI ingestion does not work. Run `scripts/publish-data.sh` from a residential IP
# (your machine, e.g. via launchd/cron) to refresh the `data` branch. This manual trigger is kept
# for use on a self-hosted runner with a residential/proxy IP.
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: refresh-data
  cancel-in-progress: true
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # publish-data.sh owns the whole pipeline: ingest → carry-forward → duration pass →
      # reindex → shrink-guarded push. (The inline publish this job used to do predates the
      # slams/{year}/ layout and would have wiped per-year snapshots.)
      - run: scripts/publish-data.sh
